[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pdfdrill"
version = "0.1.0"
description = "Token-economical drill-down extraction + PDF->LaTeX OCR quality control"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pdfplumber>=0.11",
    "pydantic>=2.0",
]

[project.optional-dependencies]
pix2tex = ["pillow>=10.0", "pix2tex>=0.1.2"]

[project.scripts]
pdfdrill = "pdfdrill.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["pdfdrill*", "docmodel*", "docops*"]
