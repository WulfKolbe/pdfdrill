# SINGLE SOURCE OF TRUTH for the pdfdrill command surface.
# `pdfdrill --help`, the SKILL.md tables, and the external drillui TUI are
# all GENERATED from this manifest; `pdfdrill skill --check` / the skill-sync
# CI gate fail on drift vs cli.py's HANDLERS. `typed: false` entries still
# need their flags filled in (Claude fills them per command over time).
# requires:/done_when: drive the prerequisite planner (`pdfdrill steps`, --ensure).

version: 1
tool: pdfdrill
invocation: PYTHONPATH=src python3 -m pdfdrill
commands:
- name: doctor
  section: Introspection (fast, no extraction)
  summary: (doctor)
  offline_ok: true
  typed: true
- name: size
  section: Introspection (fast, no extraction)
  summary: File size, page count, producer
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: abstract
  section: Introspection (fast, no extraction)
  summary: Abstract from first pages
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: toc
  section: Introspection (fast, no extraction)
  summary: Table of contents
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: fonts
  section: Introspection (fast, no extraction)
  summary: Font analysis, math font detection
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: status
  section: Introspection (fast, no extraction)
  summary: What is already known
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: md
  section: Extraction
  summary: Full Markdown with math transclusions
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: pages
    type: pages
    flag: --pages
    help: N | N-M | all
  typed: true
- name: page
  section: Extraction
  summary: Single page text extraction
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  - name: n
    type: int
    required: true
    help: page number (1-based)
  typed: true
- name: fetch
  section: Query
  summary: Retrieve stored Markdown
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  - name: layer
    type: enum
    required: true
    choices:
    - md
    - abstract
    - toc
    - bibtex
    help: what to retrieve
  flags:
  - name: section
    type: str
    flag: --section
    help: section number
  typed: true
- name: plan
  section: Planning & automation
  summary: Show what steps are needed
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  - name: question
    type: str
    required: true
    help: natural-language question
  typed: true
- name: drill
  section: Planning & automation
  summary: Full auto-drill
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: pdfinfo
  section: Introspection (fast, no extraction)
  summary: Full PdfInfo struct (title/author/dates/flags)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: bibtex
  section: Introspection (fast, no extraction)
  summary: Derived BibTeX record
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: urls
  section: Introspection (fast, no extraction)
  summary: URL annotations with anchor text (heavier; pdfplumber)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: links
  section: Introspection (fast, no extraction)
  summary: FAST external URLs via pdfinfo -url (~50ms); flags code/data hosts
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: dests
  section: Introspection (fast, no extraction)
  summary: 'Named destinations: theorems, equations, sections'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: fonts_layer
  section: Introspection (fast, no extraction)
  summary: Structured per-font records (pdffonts)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: images
  section: Introspection (fast, no extraction)
  summary: Image rectangles + metadata (pdfplumber + pdfimages -list)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: pix2tex
  section: Introspection (fast, no extraction)
  summary: Run pix2tex on candidate rects (auto from images_layer)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: page
    type: int
    flag: --page
  - name: rect
    type: rect
    flag: --rect
    help: x0,y0,x1,y1
  - name: rerun
    type: flag
    flag: --rerun
  typed: true
- name: tsv
  section: Introspection (fast, no extraction)
  summary: Word-level bounding boxes (pdftotext -tsv; --ocr forces tesseract)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: render
  section: Introspection (fast, no extraction)
  summary: Render the built markdown to PDF (pandoc + lualatex)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: mathpix
  section: Introspection (fast, no extraction)
  summary: Download MathPix OCR (lines.json, md, tex.zip); --force re-uploads
  network: true
  max_concurrency: 1
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: force
    type: flag
    flag: --force
    help: re-upload
  typed: true
- name: ocr
  section: Introspection (fast, no extraction)
  summary: 'MathPix-free OCR: tesseract → MathPix-compatible lines.json (--lang eng+equ, --ppi N). Plain
    text only (no LaTeX/CDN)'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: lang
    type: str
    flag: --lang
    default: eng+equ
  - name: ppi
    type: int
    flag: --ppi
  typed: true
- name: continuity
  section: Introspection (fast, no extraction)
  summary: Full-page OCR of the MARGINS → page-sequence markers (Seite N von M / Fortsetzung) MathPix's
    content crop drops; attaches seq to Page objects
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: pageside
  section: Introspection (fast, no extraction)
  summary: Classify each page recto/verso (book left/right) from page-number parity+position + side-note
    column asymmetry + sequence alternation; attaches page_side to model Pages (column roles flip with
    the side)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: entities
  section: Introspection (fast, no extraction)
  summary: 'Commercial entities per page: IBAN (mod-97 validated + BLZ/Konto/bank), BIC, German address,
    Steuer-/Kassen-/Aktenzeichen. Zero external tools'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: segment
  section: Introspection (fast, no extraction)
  summary: Partition a scanned bundle into ordered documents (by sender/identifier + continuity number);
    flags duplicate copies
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: elements
  section: Introspection (fast, no extraction)
  summary: Find layout elements (postal address / BOM line) via the geometric-attention GNN over tesseract
    word boxes → content-addressed tiddlers (--model M.npz)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: semantic
  section: Introspection (fast, no extraction)
  summary: 'Build the semantic graph (CSP): extractors become sensors emitting evidence; entities (Company/Person/BankAccount)
    accumulate it. --store graph.json accumulates ACROSS documents'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: store
    type: path
    flag: --store
    help: accumulate across docs
  typed: true
- name: qr
  section: Introspection (fast, no extraction)
  summary: 'Scan QR codes & barcodes (zxing-cpp): GiroCode/EPC payment QR (creditor/IBAN/amount/reference)
    + Data Matrix franking marks — confirmation data outside the text layer. --dpi 300 --formats QRCode,DataMatrix'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: dpi
    type: int
    flag: --dpi
    default: 300
  - name: formats
    type: str
    flag: --formats
    help: QRCode,DataMatrix
  typed: true
- name: fontid
  section: Introspection (fast, no extraction)
  summary: 'VISUAL font id for scanned/OCR input (no font layer): WORD crops → torch-free ONNX font-classify
    → vote WITHIN each OCR block, so font is reported per text FIELD (heading/body/fine-print), not one
    doc vote. Per-field confidence; weak on scanned generic sans. --limit 12 --ppi 200'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: spellqc
  section: Introspection (fast, no extraction)
  summary: 'Dictionary-assisted de-hyphenation QC (hunspell via spylls→enchant→.dic-set, on-demand per
    language): join/keep/REVIEW each line-break hyphen. Surfaces OCR fragments to fix'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: ordered
  section: Introspection (fast, no extraction)
  summary: Segment an ORDERED scan stack into documents (gap scoring + DataMatrix tracking codes → 2-level
    mailing/letter-enclosure). Commercial provenance (publisher=sender, receiver). --threshold 0.5. (Shuffled
    bundle → use `segment`)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: autosegment
  section: Introspection (fast, no extraction)
  summary: 'AUTO-PICK ordered vs shuffled: contiguous per-sender runs → `ordered` (gap scorer); interleaved
    → `segment` (signature grouping). Then runs the right one'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: selftest
  section: Introspection (fast, no extraction)
  summary: 'DIAGNOSTIC GRID: run the command battery across a PDF (or every PDF in a folder), log OK/⊘-n/a/✗-ERROR
    + the actual result per command → selftest.log. --full adds entities/elements/semantic'
  offline_ok: true
  positionals:
  - name: target
    type: path
    required: true
    help: pdf or dir
  flags:
  - name: full
    type: flag
    flag: --full
  typed: true
- name: rasterize
  section: Introspection (fast, no extraction)
  summary: Rasterize page(s) to PNG/JPEG for visual inspection (pdftoppm) → sidecar; --pages N|N-M|all
    --dpi 150. Read the images to see charts/equations/layout
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: pages
    type: pages
    flag: --pages
    default: all
    help: N | N-M | all
  - name: dpi
    type: int
    flag: --dpi
    default: 150
  - name: fmt
    type: enum
    flag: --fmt
    default: png
    choices:
    - png
    - jpeg
  - name: force
    type: flag
    flag: --force
  typed: true
- name: attachments
  section: Introspection (fast, no extraction)
  summary: List embedded file attachments (pdfdetach + pypdf); --extract saves them to the sidecar. Surfaces
    embedded spreadsheets/data invisible to text/MathPix
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: extract
    type: flag
    flag: --extract
  typed: true
- name: formfields
  section: Introspection (fast, no extraction)
  summary: 'Read interactive AcroForm field values (pypdf get_fields): name/value/type/options. For government/Formulare
    PDFs'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: extractimages
  section: Introspection (fast, no extraction)
  summary: (extractimages)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: pages
    type: pages
    flag: --pages
  - name: all_formats
    type: flag
    flag: --all-formats
  typed: true
- name: tables
  section: Introspection (fast, no extraction)
  summary: Extract tables KEYLESS offline (pdfplumber extract_tables) → tables.json + tables.md; --pages
    N-M
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: pages
    type: pages
    flag: --pages
  typed: true
- name: model
  section: Introspection (fast, no extraction)
  summary: Build unified docmodel from lines.json (auto-chains mathpix, falls back to tesseract ocr if
    no MathPix); --bibkey KEY sets the tiddler prefix (persisted)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: bibkey
    type: str
    flag: --bibkey
    help: tiddler prefix (persisted)
  typed: true
- name: compare
  section: Introspection (fast, no extraction)
  summary: LaTeX | KaTeX | MathPix-image comparison HTML (auto-chains model)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: snip
  section: Introspection (fast, no extraction)
  summary: OCR each equation crop via MathPix Snip (/v3/text) → competing column; --limit N
  network: true
  max_concurrency: 1
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: image
    type: str
    flag: --image
    help: any image path|url to OCR
  - name: page
    type: int
    flag: --page
  - name: rect
    type: rect
    flag: --rect
    help: x0,y0,x1,y1
  - name: limit
    type: int
    flag: --limit
  - name: force
    type: flag
    flag: --force
  typed: true
- name: candidates
  section: Introspection (fast, no extraction)
  summary: Export equation crops as a manifest for an LLM to read; --provider P --limit N
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: ingest
  section: Introspection (fast, no extraction)
  summary: (ingest)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  - name: json
    type: path
    required: true
    help: candidates.json {eq_id,latex}
  flags:
  - name: provider
    type: str
    flag: --provider
    default: llm
  - name: force
    type: flag
    flag: --force
  typed: true
- name: vision
  section: Introspection (fast, no extraction)
  summary: GPT-4o vision reads every MathPix CDN crop (incl. table-cell images) → math/TikZ/gnuplot/table
    as the `openai` provenance; --limit N (needs OPENAI_API_KEY)
  network: true
  max_concurrency: 1
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: embedimages
  section: Introspection (fast, no extraction)
  summary: Lift pdfimages + pdfplumber image rects into the model as EmbeddedImage nodes (pixel size/encoding/ppi
    + page rect), fused onto MathPix crops they contain
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: geometry
  section: Introspection (fast, no extraction)
  summary: Fuse pdftotext -tsv layout (indent/margins) onto the model — substrate for block detection
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: tiddlers
  section: Introspection (fast, no extraction)
  summary: Emit a TiddlyWiki JSON tiddler array (latex/displayMode/canonical_uri/width/height) for quick
    inspection; --bibkey KEY sets the title prefix + filename. Diagram SVGs inline by default; --embed-svg=false
    writes them to .drill/svg/<title>.svg and references via _canonical_uri (leaner store)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: bibkey
    type: str
    flag: --bibkey
    help: title prefix + filename
  - name: embed
    type: flag
    flag: --embed
  - name: force
    type: flag
    flag: --force
  - name: no_embed_svg
    type: flag
    flag: --no-embed-svg
    help: write SVGs to files
  typed: true
- name: translate
  section: Introspection (fast, no extraction)
  summary: 'DeepL-translate the document IN PLACE (--to EN-US --from RU): writes the changed tiddler file
    (translated text field) AND a bi-layer Markdown <bibkey>.md (translation + hidden source, CSS toggle);
    original kept under <field>_source (needs DEEPL_API_KEY)'
  network: true
  max_concurrency: 1
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: to
    type: str
    flag: --to
    default: EN-US
    help: target lang (DeepL)
  - name: from_
    type: str
    flag: --from
    help: source lang
  - name: limit
    type: int
    flag: --limit
  - name: force
    type: flag
    flag: --force
  typed: true
- name: lists
  section: Introspection (fast, no extraction)
  summary: Nest flat ListItems into recursive List blocks using fused indentation (auto-chains geometry)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: algorithms
  section: Introspection (fast, no extraction)
  summary: Reconstruct Algorithm blocks from MathPix pseudocode lines (caption + indented steps)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: annotate
  section: Introspection (fast, no extraction)
  summary: Promote hyperlink annotations into the model as first-class Link nodes (uri + rect Region)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: score
  section: Introspection (fast, no extraction)
  summary: Score equations by cross-provenance agreement + snip confidence; flags review candidates
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: nlp
  section: Introspection (fast, no extraction)
  summary: Stanza NLP over prose (POS/lemma/dependency + NER → props['nlp']); --limit N --pages N --types
    T,T  (optional [nlp] extra)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: limit
    type: int
    flag: --limit
  - name: pages
    type: pages
    flag: --pages
  - name: types
    type: str
    flag: --types
    help: T,T,…
  typed: true
- name: escalate
  section: Introspection (fast, no extraction)
  summary: 'Phase-3: export flagged equations for a second LLM reading; --limit N'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: relearn
  section: Introspection (fast, no extraction)
  summary: 'Phase-3: re-score after ingest; report resolved vs still-flagged'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: eqnums
  section: Introspection (fast, no extraction)
  summary: Fuse equation numbers ("(N)") from margin geometry for ||FO/||FREF transclusion
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: bibliography
  section: Introspection (fast, no extraction)
  summary: Parse the References section into Reference nodes (citekey/author/year/text)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: bibsource
  section: Introspection (fast, no extraction)
  summary: 'Ingest the author''s GOLD bibliography (--bbl file.bbl + --bib file.bib): alpha label↔citekey↔fields,
    links in-text citations by label. No API.'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: bibfetch
  section: Introspection (fast, no extraction)
  summary: Enrich References with full BibTeX via Perplexity SONAR; --limit N (needs PERPLEXITY_API_KEY)
  network: true
  max_concurrency: 1
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: citedrill
  section: Other
  summary: (citedrill)
  offline_ok: true
  typed: false
- name: report
  section: Introspection (fast, no extraction)
  summary: Full inline+display math report (formula-report.html). --scale N scales each KaTeX render to
    the CDN image height (1.0=same, 2.0=200%); --embed
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: scale
    type: str
    flag: --scale
    help: KaTeX scale vs CDN image (1.0=same)
  - name: embed
    type: flag
    flag: --embed
    help: base64-inline crops (offline)
  typed: true
- name: folder
  section: Introspection (fast, no extraction)
  summary: Build the full structure for every PDF in <dir> from existing
  offline_ok: true
  positionals:
  - name: dir
    type: dir
    required: true
    help: directory of PDFs (offline batch)
  typed: true
- name: latex
  section: Introspection (fast, no extraction)
  summary: Ingest author .tex/.tgz as a `tex` provenance (original+expanded LaTeX); --tex <path>
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: tex
    type: path
    flag: --tex
    help: author .tex/.tgz
  typed: true
- name: latexbook
  section: Introspection (fast, no extraction)
  summary: (latexbook)
