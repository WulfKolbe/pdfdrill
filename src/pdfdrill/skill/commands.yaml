    flag: --no-svg
  typed: true
- name: markdown
  section: Introspection (fast, no extraction)
  summary: 'Build a source-only model from LLM-summary Markdown (yt2tw route): sections/paragraphs/math/lists
    + cite{} commands linked to the gold ```bibtex appendix (or the numbered References list). --bibkey
    K'
  offline_ok: true
  positionals:
  - name: md
    type: path
    required: true
    help: LLM-summary Markdown file
  typed: true
- name: identifiers
  section: Introspection (fast, no extraction)
  summary: 'Front-matter scan (scoped by the booktoc offset): checksum-valid ISBN/ISSN/DOI/arXiv + German
    ids + ALL-CAPS named-entity candidates (publisher/author)'
