- name: clean
  section: Introspection (fast, no extraction)
  summary: 'Strip MathPix LaTeX residuals from the model: a leading section* command merged into a paragraph
    -> the title alone + kind/refnum fields (so semantic analysis sees plain text)'
  offline_ok: true
  positionals:
  - name: pdf|md
    type: str
    required: true
  typed: false
- name: locate
  section: Introspection (fast, no extraction)
  summary: Locate embedded images on their pages (canonical pt/top-left coords + normalized [0,1] + PDF
