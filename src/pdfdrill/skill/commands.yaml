  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: gaps
  section: Introspection (fast, no extraction)
  summary: 'Report MISSING information (cohomology-as-linter): acronyms used but never expanded, undeclared
    math symbols, novelty claims without citations, unmatched in-text citations'
  offline_ok: true
  positionals:
  - name: pdf|md
    type: str
    required: true
  typed: false
- name: llmtext
  section: Introspection (fast, no extraction)
  summary: 'Flat LLM dump: per unit the tiddler title + paragraph text / formula latex, document order,
    units split on double line breaks + separated by --delimiter (default %%%%); empty formulas skipped'
  offline_ok: true
  positionals:
  - name: pdf|md
