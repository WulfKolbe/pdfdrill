# SINGLE SOURCE OF TRUTH for the pdfdrill command surface.
# `pdfdrill --help`, the SKILL.md tables, and the external drillui TUI are
# all GENERATED from this manifest; `pdfdrill skill --check` / the skill-sync
# CI gate fail on drift vs cli.py's HANDLERS. `typed: false` entries still
# need their flags filled in (Claude fills them per command over time).
# requires:/done_when: drive the prerequisite planner (`pdfdrill steps`, --ensure).

version: 1
tool: pdfdrill
invocation: PYTHONPATH=src python3 -m pdfdrill
commands:
- name: doctor
  section: Introspection (fast, no extraction)
  summary: 'Requirement check: system tools (poppler/tesseract/LaTeX+dvisvgm), Python deps, API keys +
    the apt-get fix line'
  offline_ok: true
  typed: true
- name: config
  section: Introspection (fast, no extraction)
  summary: 'Show / init the config FILE (not CLI flags): where URL/arXiv downloads + each doc''s .drill
    folder land (default ~/Downloads). --init writes ~/.config/pdfdrill/config.json; --json; --download-dir'
  offline_ok: true
  flags:
  - name: init
    flag: --init
    type: flag
  - name: json
    flag: --json
    type: flag
  - name: download_dir
    flag: --download-dir
    type: flag
  typed: true
- name: artifacts
  section: Introspection (fast, no extraction)
  summary: 'List the openable files in the doc''s drill folder (report.html, the extracted <bibkey>.md,
    tiddlers/semantic/llm *.json/*.txt, SVGs) with paths — clickable in the drillui Outputs panel. Giant
    model JSON hidden unless --all. (`status` also lists them.)'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF/Markdown drilled-doc path, URL, or arXiv id
  flags:
  - name: all
    flag: --all
    type: flag
    help: include the giant model/ir JSON
  typed: true
- name: size
  section: Introspection (fast, no extraction)
  summary: File size, page count, producer
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: ls
  section: Introspection (fast, no extraction)
  summary: 'Shallow-scan a FOLDER: run pdfinfo (size) on every PDF, store it in each file''s sidecar,
    and report a compact table led by the PRODUCER (the triage signal). The cheapest rung over a
    whole directory; size is cached so re-running is fast. --images adds the pdfimages count.'
  offline_ok: true
  positionals:
  - name: dir
    type: str
    required: false
    help: folder to scan (default the current directory)
  flags:
  - name: images
    type: flag
    flag: --images
    help: add the pdfimages -list count column
  typed: true
- name: route
  section: Introspection (fast, no extraction)
  summary: 'Auto-pick the OCR lane and (with --run) EXECUTE it: born-digital → pdfminer/text-layer
    (free); scanned & ≤20 pages → Gemma 4 (5-parallel); scanned & larger → MathPix (large books).
    Auto-chains size. Without --run reports the decision; with --run runs the chosen lane (paid/keyed
    lanes degrade gracefully when creds are absent).'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: run
    type: flag
    flag: --run
    help: execute the chosen lane (not just report)
  typed: true
  requires:
  - size
- name: abstract
  section: Introspection (fast, no extraction)
  summary: Abstract from first pages
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: toc
  section: Introspection (fast, no extraction)
  summary: Table of contents
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: fonts
  section: Introspection (fast, no extraction)
  summary: Font analysis, math font detection
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: status
  section: Introspection (fast, no extraction)
  summary: What is already known
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: md
  section: Extraction
  summary: Full Markdown with math transclusions
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: pages
    type: pages
    flag: --pages
    help: N | N-M | all
  typed: true
- name: page
  section: Extraction
  summary: Single page text extraction
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  - name: n
    type: int
    required: true
    help: page number (1-based)
  typed: true
- name: fetch
  section: Query
  summary: Retrieve stored Markdown
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  - name: layer
    type: enum
    required: true
    choices:
    - md
    - abstract
    - toc
    - bibtex
    help: what to retrieve
  flags:
  - name: section
    type: str
    flag: --section
    help: section number
  typed: true
- name: plan
  section: Planning & automation
  summary: Show what steps are needed
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  - name: question
    type: str
    required: true
    help: natural-language question
  typed: true
- name: drill
  section: Planning & automation
  summary: Full auto-drill
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - name: full
    flag: --full
    type: flag
    help: wipe sidecar + re-run from cold
- name: pdfinfo
  section: Introspection (fast, no extraction)
  summary: Full PdfInfo struct (title/author/dates/flags)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: bibtex
  section: Introspection (fast, no extraction)
  summary: 'Derived BibTeX record from embedded PDF metadata, AUGMENTED by the free arXiv abs-page
    metadata (title/authors) + the drilled title; warns when still a placeholder (run abstract/model first)'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: urls
  section: Introspection (fast, no extraction)
  summary: URL annotations with anchor text (heavier; pdfplumber)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: links
  section: Introspection (fast, no extraction)
  summary: FAST external URLs via pdfinfo -url (~50ms); flags code/data hosts
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: dests
  section: Introspection (fast, no extraction)
  summary: 'Named destinations: theorems, equations, sections'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: fonts_layer
  section: Introspection (fast, no extraction)
  summary: Structured per-font records (pdffonts)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: images
  section: Introspection (fast, no extraction)
  summary: Image rectangles + metadata (pdfplumber + pdfimages -list)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: tsv
  section: Introspection (fast, no extraction)
  summary: Word-level bounding boxes (pdftotext -tsv; --ocr forces tesseract)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - name: ocr
    flag: --ocr
    type: flag
    help: force OCR TSV (no text layer)
- name: render
  section: Introspection (fast, no extraction)
  summary: Render the built markdown to PDF (pandoc + lualatex)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - &id001
    name: force
    flag: --force
    type: flag
- name: mathpix
  section: Introspection (fast, no extraction)
  summary: Download MathPix OCR (lines.json, md, tex.zip); --force re-uploads
  network: true
  max_concurrency: 1
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: force
    type: flag
    flag: --force
    help: re-upload
  typed: true
- name: ocr
  section: Introspection (fast, no extraction)
  summary: 'MathPix-free OCR: tesseract → MathPix-compatible lines.json (--lang eng+equ, --ppi N). Plain
    text only (no LaTeX/CDN)'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: lang
    type: str
    flag: --lang
    default: eng+equ
  - name: ppi
    type: int
    flag: --ppi
  typed: true
- name: continuity
  section: Introspection (fast, no extraction)
  summary: Full-page OCR of the MARGINS → page-sequence markers (Seite N von M / Fortsetzung) MathPix's
    content crop drops; attaches seq to Page objects
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - name: lang
    flag: --lang
    type: str
    default: deu+eng
  - name: ppi
    flag: --ppi
    type: int
    default: 250
  - *id001
- name: pageside
  section: Introspection (fast, no extraction)
  summary: Classify each page recto/verso (book left/right) from page-number parity+position + side-note
    column asymmetry + sequence alternation; attaches page_side to model Pages (column roles flip with
    the side)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: entities
  section: Introspection (fast, no extraction)
  summary: 'Commercial entities per page: IBAN (mod-97 validated + BLZ/Konto/bank), BIC, German address,
    Steuer-/Kassen-/Aktenzeichen. Zero external tools'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - *id001
- name: segment
  section: Introspection (fast, no extraction)
  summary: Partition a scanned bundle into ordered documents (by sender/identifier + continuity number);
    flags duplicate copies
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - *id001
- name: elements
  section: Introspection (fast, no extraction)
  summary: Find layout elements (postal address / BOM line) via the geometric-attention GNN over tesseract
    word boxes → content-addressed tiddlers (--model M.npz)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - name: model
    flag: --model
    type: path
    help: trained GNN .npz
  - name: bibkey
    flag: --bibkey
    type: str
  - name: source
    flag: --source
    type: str
  - name: lang
    flag: --lang
    type: str
    default: deu+eng
  - name: ppi
    flag: --ppi
    type: int
    default: 300
  - *id001
- name: semantic
  section: Introspection (fast, no extraction)
  summary: 'Build the semantic graph (CSP): extractors become sensors emitting evidence; entities (Company/Person/BankAccount)
    accumulate it. --store graph.json accumulates ACROSS documents'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: store
    type: path
    flag: --store
    help: accumulate across docs
  typed: true
  requires:
  - model
- name: qr
  section: Introspection (fast, no extraction)
  summary: 'Scan QR codes & barcodes (zxing-cpp): GiroCode/EPC payment QR (creditor/IBAN/amount/reference)
    + Data Matrix franking marks — confirmation data outside the text layer. --dpi 300 --formats QRCode,DataMatrix'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: dpi
    type: int
    flag: --dpi
    default: 300
  - name: formats
    type: str
    flag: --formats
    help: QRCode,DataMatrix
  typed: true
- name: fontid
  section: Introspection (fast, no extraction)
  summary: 'VISUAL font id for scanned/OCR input (no font layer): WORD crops → torch-free ONNX font-classify
    → vote WITHIN each OCR block, so font is reported per text FIELD (heading/body/fine-print), not one
    doc vote. Per-field confidence; weak on scanned generic sans. --limit 12 --ppi 200'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - name: pages
    flag: --pages
    type: pages
  - name: limit
    flag: --limit
    type: int
    default: 12
  - name: ppi
    flag: --ppi
    type: int
    default: 200
- name: spellqc
  section: Introspection (fast, no extraction)
  summary: 'Dictionary-assisted de-hyphenation QC (hunspell via spylls→enchant→.dic-set, on-demand per
    language): join/keep/REVIEW each line-break hyphen. Surfaces OCR fragments to fix'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - name: lang
    flag: --lang
    type: str
    help: de|en (auto-detected if omitted)
- name: ordered
  section: Introspection (fast, no extraction)
  summary: Segment an ORDERED scan stack into documents (gap scoring + DataMatrix tracking codes → 2-level
    mailing/letter-enclosure). Commercial provenance (publisher=sender, receiver). --threshold 0.5. (Shuffled
    bundle → use `segment`)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - name: threshold
    flag: --threshold
    type: str
    default: '0.5'
    help: gap cut score 0..1
- name: autosegment
  section: Introspection (fast, no extraction)
  summary: 'AUTO-PICK ordered vs shuffled: contiguous per-sender runs → `ordered` (gap scorer); interleaved
    → `segment` (signature grouping). Then runs the right one'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - name: threshold
    flag: --threshold
    type: str
    default: '0.5'
    help: gap cut score 0..1
- name: selftest
  section: Introspection (fast, no extraction)
  summary: 'DIAGNOSTIC GRID: run the command battery across a PDF (or every PDF in a folder), log OK/⊘-n/a/✗-ERROR
    + the actual result per command → selftest.log. --full adds entities/elements/semantic'
  offline_ok: true
  positionals:
  - name: target
    type: path
    required: true
    help: pdf or dir
  flags:
  - name: full
    type: flag
    flag: --full
  typed: true
- name: rasterize
  section: Introspection (fast, no extraction)
  summary: Rasterize page(s) to PNG/JPEG for visual inspection (Ghostscript, >=400 DPI) → sidecar;
    --pages N|N-M|all --dpi 400. Read the images to see charts/equations/layout
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: pages
    type: pages
    flag: --pages
    default: all
    help: N | N-M | all
  - name: dpi
    type: int
    flag: --dpi
    default: 400
  - name: fmt
    type: enum
    flag: --fmt
    default: png
    choices:
    - png
    - jpeg
  - name: force
    type: flag
    flag: --force
  typed: true
- name: attachments
  section: Introspection (fast, no extraction)
  summary: List embedded file attachments (pdfdetach + pypdf); --extract saves them to the sidecar. Surfaces
    embedded spreadsheets/data invisible to text/MathPix
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: extract
    type: flag
    flag: --extract
  typed: true
- name: formfields
  section: Introspection (fast, no extraction)
  summary: 'Read interactive AcroForm field values (pypdf get_fields): name/value/type/options. For government/Formulare
    PDFs'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
- name: extractimages
  section: Introspection (fast, no extraction)
  summary: Extract embedded raster image BYTES to files (pdfimages); tiny masks/decorative <1KB filtered
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: pages
    type: pages
    flag: --pages
  - name: all_formats
    type: flag
    flag: --all-formats
  typed: true
- name: tables
  section: Introspection (fast, no extraction)
  summary: Extract tables KEYLESS offline (pdfplumber extract_tables) → tables.json + tables.md; --pages
    N-M
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: pages
    type: pages
    flag: --pages
  typed: true
- name: model
  section: Introspection (fast, no extraction)
  summary: 'Build unified docmodel from lines.json. No lines.json → MathPix (if key) → arXiv LaTeX
    source (arXiv) → born-digital text layer (pdfplumber, FREE/fast) → tesseract OCR (scans only).
    --bibkey KEY sets the tiddler prefix (persisted)'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: bibkey
    type: str
    flag: --bibkey
    help: tiddler prefix (persisted)
  typed: true
  done_when: model
- name: compare
  section: Introspection (fast, no extraction)
  summary: LaTeX | KaTeX | MathPix-image comparison HTML (auto-chains model)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  requires:
  - model
- name: snip
  section: Introspection (fast, no extraction)
  summary: 'OCR each equation/table crop → competing column. THE STATE MACHINE picks
    the provider (vision_router: MathPix when keyed — native promptless OCR — else the
    cheap Gemma-4 vision route on Novita); --gemma/--provider remain explicit
    overrides. --limit N'
  network: true
  max_concurrency: 1
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: image
    type: str
    flag: --image
    help: any image path|url to OCR
  - name: page
    type: int
    flag: --page
  - name: rect
    type: rect
    flag: --rect
    help: x0,y0,x1,y1
  - name: limit
    type: int
    flag: --limit
  - name: force
    type: flag
    flag: --force
  - name: gemma
    type: flag
    flag: --gemma
    help: use the Gemma-4 vision model (Novita.ai) instead of MathPix
  - name: provider
    type: str
    flag: --provider
    help: mathpix (default) | gemma
  typed: true
- name: candidates
  section: Introspection (fast, no extraction)
  summary: Export equation crops as a manifest for an LLM to read; --provider P --limit N
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - name: provider
    flag: --provider
    type: str
    default: llm
  - name: limit
    flag: --limit
    type: int
  - name: out
    flag: --out
    type: path
- name: ingest
  section: Introspection (fast, no extraction)
  summary: Attach externally-supplied {eq_id,latex} readings as a competing provenance (grows a compare
    column)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  - name: json
    type: path
    required: true
    help: candidates.json {eq_id,latex}
  flags:
  - name: provider
    type: str
    flag: --provider
    default: llm
  - name: force
    type: flag
    flag: --force
  typed: true
- name: vision
  section: Introspection (fast, no extraction)
  summary: GPT-4o vision reads every MathPix CDN crop (incl. table-cell images) → math/TikZ/gnuplot/table
    as the `openai` provenance; --limit N (needs OPENAI_API_KEY)
  network: true
  max_concurrency: 1
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - name: limit
    flag: --limit
    type: int
  - *id001
- name: llm
  section: Introspection (fast, no extraction)
  summary: 'Keyless LLM-delegation driver: show detected runtime (cli/sandbox/none) and any pending vision/bibtex/links
    requests deferred to the running Claude agent; --show dumps open prompts, --runtime prints the runtime
    only'
  network: false
  max_concurrency: 1
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - name: show
    flag: --show
    type: bool
  - name: runtime
    flag: --runtime
    type: bool
- name: embedimages
  section: Introspection (fast, no extraction)
  summary: Lift pdfimages + pdfplumber image rects into the model as EmbeddedImage nodes (pixel size/encoding/ppi
    + page rect), fused onto MathPix crops they contain
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - *id001
- name: geometry
  section: Introspection (fast, no extraction)
  summary: Fuse pdftotext -tsv layout (indent/margins) onto the model — substrate for block detection
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  flags:
  - *id001
- name: tiddlers
  section: Introspection (fast, no extraction)
  summary: Emit a TiddlyWiki JSON tiddler array (latex/displayMode/canonical_uri/width/height) for quick
