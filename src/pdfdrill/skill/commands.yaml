- name: scikgtex
  section: Introspection (fast, no extraction)
  summary: Project to SciKGTeX-annotated LaTeX → compiled PDF carries ORKG contribution metadata (title/authors/field
    + research-problem/method/result roles + numeric facts + bib-DOI links) as XMP/RDF. --compile (lualatex
    + vendored scikgtex)
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  typed: true
  requires:
  - model
  flags:
  - name: compile
    flag: --compile
    type: flag
- name: skill
  section: Introspection (fast, no extraction)
  summary: Emit/serve the bundled SKILL folder (--emit DIR | --json | --check)
  offline_ok: true
  flags:
  - name: emit
    flag: --emit
    type: dir
    help: write the complete SKILL folder to DIR
  - name: json
    flag: --json
    type: flag
    help: print the typed manifest as JSON
  - name: check
    flag: --check
    type: flag
    help: manifest <-> handler-dict parity
  typed: true
- name: steps
  section: Planning & automation
  summary: Show the prerequisite chain for a command (what's done, what --ensure would run)
  offline_ok: true
  positionals:
  - name: cmd
    type: str
    required: true
    help: target command
  - name: pdf
    type: pdf
    required: true
  typed: true
- name: combine
  section: Planning & automation
  summary: 'Merge several drilled docs into ONE combined store (--out FILE) for MULTI-DOCUMENT chat/retrieve;
    pools prose/math/concepts, ids namespaced <bibkey>:<id>. Each input must be drilled (model) first'
  offline_ok: true
  positionals:
  - name: docs
    type: path
    required: true
    help: two or more drilled PDFs/.md (each needs a built model)
  flags:
  - name: out
    flag: --out
    type: path
    help: combined store file (e.g. heim.docpack)
  - name: force
    flag: --force
    type: flag
  typed: true
- name: reconcile
  section: Planning & automation
  summary: 'Dual-route reconciliation (parallel MathPix + pdfminer.six): keep the pdfminer model''s
    STRUCTURE (citations/figrefs/transclusions/front-matter) + GEOMETRY (self-contained inspect), correct
    its garbled MATH with MathPix''s clean LaTeX, region-matched (per-aspect best-of). Runs the math-garble
    QC always; adopts MathPix when a `--mathpix LINES.json` source is present (else reports the garble +
    next step). Geometry never touched; original kept as latex_pdfminer.'
  offline_ok: true
  requires:
  - model
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: mathpix
    flag: --mathpix
    type: str
    help: a MathPix lines.json to reconcile against
  - name: adopt-all
    flag: --adopt-all
    type: flag
    help: adopt MathPix on ALL matched eqs, not just garbled
  typed: true
- name: occurrences
  section: Query
  summary: 'Emit <bibkey>.occurrences.json — a per-element region list (page + top_left_x/y/width/height +
    tiddler title) for the optional EXTERNAL image-enrichment tools (locate an element on the rendered page
    by region, no content matching). Region-bearing types only: Equation by default, --type adds Table/
    Picture/Diagram. Inline Formula excluded (deduped, no per-object region).'
  offline_ok: true
  requires:
  - model
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF/Markdown drilled-doc path, URL, or arXiv id
  flags:
  - name: type
    flag: --type
    type: str
    help: comma list of region types (default Equation; Table/Picture/Diagram)
  typed: true
- name: okf
  section: Extraction
  summary: 'Project the docmodel into an OKF (Open Knowledge Format) BUNDLE: one Markdown-with-YAML-frontmatter
    file per knowledge unit (required `type`) + a reserved index.md, cross-linked by [label](./unit.md)
    markdown links. OKF is the tiddler bundle re-serialized; the .md files open in drillui like any
    markdown. Written to <drill>/okf/<bibkey>/ (or --out DIR).'
  offline_ok: true
  requires:
  - model
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF/Markdown drilled-doc path, URL, or arXiv id
  flags:
  - name: out
    flag: --out
    type: str
    help: write the bundle to DIR (default <drill>/okf/<bibkey>/)
  - name: bibkey
    flag: --bibkey
    type: str
    help: tiddler/title prefix + bundle folder name
  - name: semantic
    flag: --semantic
    type: flag
    help: project the SEMANTIC GRAPH (entities/relations) not the docmodel — the commercial-doc form
  typed: true
- name: context
  section: Planning & automation
  summary: 'Project the docmodel into an LLM CONTEXT (deterministic structural RAG): select typed objects
    by free-text query + --type/--concept/--section, rank (structural/IDF now; pluggable per-aspect
    embedding rankers later), render Markdown blocks with metadata + object ids under --max-tokens N.
    The LLM sees a projection, never the whole doc or a filename. Also accepts a combined store.'
  offline_ok: true
  requires:
  - model
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF/Markdown drilled-doc path, URL, or arXiv id
  - name: query
    type: str
    required: false
    help: free-text query (optional; flow order without it)
  flags:
  - name: type
    flag: --type
    type: str
    help: comma list — definition,formula,theorem,figure,table,reference,concept
  - name: concept
    flag: --concept
    type: str
    help: a named concept + its occurrences
  - name: section
    flag: --section
    type: str
    help: restrict to a section number/caption
  - name: k
    flag: --k
    type: int
    help: cap the number of units
  - name: max-tokens
    flag: --max-tokens
    type: int
    help: token budget for the projected context
  - name: aspect
    flag: --aspect
    type: str
    help: ranker aspect (default structural; math/citation later)
  - name: out
    flag: --out
    type: str
    help: write Markdown to FILE
  typed: true
- name: retrieve
  section: Planning & automation
  summary: 'Transform a question into grounded context: top-k relevant drilled units (the chat-proxy enrichment
    / future-SKILL seed). Also accepts a COMBINED store (multi-document)'
  offline_ok: true
  requires:
  - model
  positionals:
  - &id002
    name: pdf
    type: pdf
    required: true
    help: PDF/Markdown drilled-doc path, URL, or arXiv id
  - name: question
    type: str
    required: true
  flags:
  - name: k
    flag: --k
    type: int
    default: 8
    help: number of units
  - name: json
    flag: --json
    type: flag
    help: machine-readable {units,prompt}
  typed: true
- name: chatlog
  section: Planning & automation
  summary: 'Store one Q&A turn: append the transcript + emit the answer as a kitem in the semantic graph
    (provenance qid=ask)'
  offline_ok: true
  positionals:
  - *id002
  flags:
  - name: question
    flag: --question
    type: str
    required: true
  - name: answer
    flag: --answer
    type: str
    required: true
  - name: units
    flag: --units
    type: str
    help: comma-separated cited unit ids
  - name: model
    flag: --model
    type: str
    help: the LLM that answered
  - name: verdict
    flag: --verdict
    type: str
    help: correct|wrong — calibration feedback feeding the ask --precision gate
  typed: true
- name: remath
  section: OCR / model pipeline
  summary: 'Keyless MathPix replacement: rebuild MathPix-quality Markdown (LaTeX math) from rendered pages
    via Claude delegation, so transclusion works without a MathPix key'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: pages
    flag: --pages
    type: pages
    help: N | N-M | all (default all)
  - name: force
    flag: --force
    type: flag
  typed: true
- name: visionocr
  section: OCR / model pipeline
  summary: 'Keyless agent-delegated EQUATION OCR: rasterize each page → the running Claude reads the math →
    fold {page,number,latex,kind} records into the lines.json as real Equation nodes (number paired by
    geometry). The keyless math route when tesseract built a doc prose-only (NEEDS_VISION_OCR)'
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
    help: PDF path, https URL, or bare arXiv id
  flags:
  - name: ingest
    flag: --ingest
    type: str
    help: 'fold a records JSON file ([{page,number,latex,kind}] or {records:[…]}) directly, skip delegation'
  - name: dpi
    flag: --dpi
    type: int
    default: 200
  - name: pages
    flag: --pages
    type: pages
    help: N | N-M | all (default all)
  - name: force
    flag: --force
    type: flag
  typed: true
help_intro: 'pdfdrill — portable PDF drill-down toolkit


  Input: <pdf> may be a local path OR an https URL from a known host. arXiv URLs/ids

  (https://arxiv.org/abs/<id>, /pdf/<id>, or a bare 2510.11170v2) download the PDF

  once (cached) and unlock the FREE routes — `abstract` reads the abs page and

  `latex` downloads the e-print .tgz (gold equations), so MathPix is skipped by

  default (use `mathpix --force` to override). NEVER curl/wget/tar a PDF or e-print

  yourself, and never hand-process .tex/.tgz — pass the URL/id/path; pdfdrill

  decides if/when to use the LaTeX source.'
