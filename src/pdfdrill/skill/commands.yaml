    figures
  offline_ok: true
  positionals:
  - name: pdf
    type: pdf
    required: true
  typed: false
- name: rulebook
  section: Introspection (fast, no extraction)
  summary: 'Claims/definitions -> kitems (fixpoint, evidence spans) -> rulebook.md: one supported/accepted
    statement per line with a [->k:hash] drill-down anchor + kitem tiddlers'
  offline_ok: true
  positionals:
  - name: pdf|md
    type: str
    required: true
  typed: false
- name: svg
  section: Introspection (fast, no extraction)
  summary: Render TikZ diagrams + tables to SVG via latex->dvisvgm (KaTeX can't); embeds in the report
  offline_ok: true
  positionals:
  - name: pdf|tex
    type: str
    required: true
  typed: false
- name: stex
  section: Introspection (fast, no extraction)
  summary: 'Project the semantic graph to enriched LaTeX: acronyms/glossary/Table-of-Symbols/index (--compile
